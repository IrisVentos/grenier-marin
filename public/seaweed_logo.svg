  <!-- Bubbles -->
  <circle cx="460" cy="180" r="5" fill="none" stroke="#111" stroke-width="2.5"/>
  <circle cx="472" cy="155" r="3.5" fill="none" stroke="#111" stroke-width="2"/>
  <circle cx="465" cy="132" r="2.5" fill="none" stroke="#111" stroke-width="2"/>
